<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gresham Index — Live History</title>
<style>
  :root{
    --bg:#0E1520; --card:#17212F; --line:#243247; --text:#E8EDF4; --muted:#8A94A6;
    --z0:#15803D; --z1:#22C55E; --z2:#FACC15; --z3:#F59E0B; --z4:#94A3B8; --z5:#F97316; --z6:#DC2626;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;padding:16px;display:flex;justify-content:center}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 12px;max-width:1060px;width:100%}
  .head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:6px;margin-bottom:6px}
  .kicker{font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:600}
  .ranges{display:flex;gap:6px}
  .ranges button{background:none;border:1px solid var(--line);color:var(--muted);font-size:11px;padding:3px 10px;border-radius:999px;cursor:pointer}
  .ranges button.on{color:var(--text);border-color:#3B4C66;background:#1C2836}
  #wrap{position:relative}
  canvas{width:100%;display:block;cursor:crosshair}
  #tip{position:absolute;pointer-events:none;background:#0B111Aee;border:1px solid var(--line);border-radius:10px;
       padding:8px 11px;font-size:12.5px;line-height:1.5;display:none;white-space:nowrap;z-index:5}
  #tip .d{color:var(--muted);font-size:11px}
  #tip .p{font-weight:700;font-size:14px}
  #tip .z{display:inline-block;margin-top:2px;padding:1px 8px;border-radius:999px;font-size:11px;font-weight:700;color:#0B111A}
  .legend{display:flex;flex-wrap:wrap;gap:4px 14px;margin-top:8px}
  .legend span{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .legend i{width:14px;height:3px;border-radius:2px;display:inline-block}
  .foot{margin-top:8px;font-size:10.5px;color:var(--muted)}
  .foot b{color:var(--text);font-weight:600}
  #state{padding:60px 0;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="kicker">GRESHAM INDEX — BITCOIN, COLORED BY CYCLE RISK</div>
    <div class="ranges" id="ranges">
      <button data-y="0" class="on">All</button><button data-y="4">4y</button><button data-y="1">1y</button>
    </div>
  </div>
  <div id="wrap">
    <div id="state">loading live data\u2026</div>
    <canvas id="cv" height="420" style="display:none"></canvas>
    <div id="tip"></div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
(function(){
"use strict";
const URL_HIST = "https://greshamindex.github.io/gresham-index/history.json";
const BANDS = [
  {lo:0.00, c:"#15803D", n:"Heavy Accumulation",  s:"Heavy Accum."},
  {lo:0.15, c:"#22C55E", n:"Strong Accumulation", s:"Strong Accum."},
  {lo:0.30, c:"#FACC15", n:"Accumulation",        s:"Accum."},
  {lo:0.50, c:"#F59E0B", n:"Light Accumulation",  s:"Light Accum."},
  {lo:0.65, c:"#94A3B8", n:"Neutral",             s:"Neutral", divider:true},
  {lo:0.75, c:"#F97316", n:"Distribution",        s:"Distrib."},
  {lo:0.85, c:"#DC2626", n:"Heavy Distribution",  s:"Heavy Distrib."},
];
function band(r){ let b=BANDS[0]; for(const x of BANDS){ if(r>=x.lo) b=x; } return b; }

const cv=document.getElementById("cv"), tip=document.getElementById("tip"),
      state=document.getElementById("state"), wrap=document.getElementById("wrap");
let D=[], view=[], years=0, px=[], layout=null;

// legend
document.getElementById("legend").innerHTML =
  BANDS.map(b=>`<span><i style="background:${b.c}"></i>${b.n}</span>`).join("");

fetch(URL_HIST).then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
.then(j=>{
  D = j.series
    .filter(s=>s[0]>="2014-01-01")
    .map(s=>({t:Date.parse(s[0]+"T00:00:00Z"), d:s[0], r:s[1], p:s[2]}));
  if(D.length<100) throw new Error("series too short");
  const last=D[D.length-1];
  document.getElementById("foot").innerHTML =
    `<b>Live</b> \u00b7 data through ${last.d} \u00b7 latest reading <b>${last.r.toFixed(2)}</b> \u2014 ${band(last.r).n}`+
    ` \u00b7 frozen v1.0.1 rules \u00b7 Data: CoinMetrics Community (CC BY-NC 4.0)`;
  state.style.display="none"; cv.style.display="block";
  setView(); draw();
}).catch(e=>{ state.textContent="Could not load live data ("+e.message+"). Please refresh."; });

function setView(){
  if(!years){ view=D; return; }
  const cut = D[D.length-1].t - years*365.25*86400000;
  view = D.filter(x=>x.t>=cut);
}

document.getElementById("ranges").addEventListener("click", ev=>{
  const b=ev.target.closest("button"); if(!b) return;
  document.querySelectorAll("#ranges button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); years=+b.dataset.y; setView(); draw();
});

function draw(){
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||wrap.clientWidth, H=420;
  cv.width=W*dpr; cv.height=H*dpr;
  const g=cv.getContext("2d"); g.scale(dpr,dpr);
  const padL=56, padR=14, padT=10, padB=26;
  const x0=padL, x1=W-padR, y0=padT, y1=H-padB;

  const t0=view[0].t, t1=view[view.length-1].t;
  let pmin=Infinity, pmax=0;
  for(const v of view){ if(v.p<pmin)pmin=v.p; if(v.p>pmax)pmax=v.p; }
  const lmin=Math.log10(pmin)-0.06, lmax=Math.log10(pmax)+0.06;
  const X=t=>x0+(t-t0)/(t1-t0)*(x1-x0);
  const Y=p=>y1-(Math.log10(p)-lmin)/(lmax-lmin)*(y1-y0);
  layout={x0,x1,t0,t1};

  g.clearRect(0,0,W,H);

  // y grid: powers of 10 and 3x steps within range
  g.strokeStyle="#1C2836"; g.fillStyle="#8A94A6"; g.font="10.5px system-ui"; g.textAlign="right";
  for(let e=2;e<=6;e++){
    for(const m of [1,3]){
      const p=m*Math.pow(10,e);
      if(Math.log10(p)<lmin||Math.log10(p)>lmax) continue;
      const y=Y(p);
      g.beginPath(); g.moveTo(x0,y); g.lineTo(x1,y); g.stroke();
      g.fillText("$"+p.toLocaleString(), x0-7, y+3.5);
    }
  }
  // x grid: year ticks (or months if short view)
  g.textAlign="center";
  const d0=new Date(t0), d1=new Date(t1);
  const spanY=(t1-t0)/31557600000;
  if(spanY>2.2){
    const yr0=d0.getUTCFullYear()+1, yr1=d1.getUTCFullYear(), nyr=yr1-yr0+1;
    // thin labels so each has ~46px of room; gridlines stay on every year
    const step=Math.max(1, Math.ceil(nyr*46/(x1-x0)));
    for(let y=yr0;y<=yr1;y++){
      const t=Date.UTC(y,0,1); if(t<t0||t>t1) continue;
      const x=X(t);
      g.strokeStyle="#1C2836"; g.beginPath(); g.moveTo(x,y0); g.lineTo(x,y1); g.stroke();
      if((yr1-y)%step===0) g.fillText(String(y), x, H-8);   // anchor newest year, thin backwards
    }
  } else {
    const monthStep=(x1-x0)<420?6:3;   // fewer month ticks on narrow screens
    for(let y=d0.getUTCFullYear();y<=d1.getUTCFullYear();y++)
      for(let m=0;m<12;m+=monthStep){
        const t=Date.UTC(y,m,1); if(t<t0||t>t1) continue;
        const x=X(t);
        g.strokeStyle="#1C2836"; g.beginPath(); g.moveTo(x,y0); g.lineTo(x,y1); g.stroke();
        g.fillText(new Date(t).toLocaleDateString("en",{month:"short",year:"2-digit",timeZone:"UTC"}), x, H-8);
      }
  }

  // colored price line: batch consecutive same-color segments
  px=new Array(view.length);
  for(let i=0;i<view.length;i++) px[i]=X(view[i].t);
  g.lineWidth=spanY>6?1.6:2.2; g.lineJoin="round"; g.lineCap="round";
  let i=0;
  while(i<view.length-1){
    const c=band(view[i].r).c;
    g.strokeStyle=c; g.beginPath(); g.moveTo(px[i],Y(view[i].p));
    let j=i+1;
    while(j<view.length && band(view[j-1].r).c===c){ g.lineTo(px[j],Y(view[j].p)); j++; }
    g.stroke(); i=j-1;
  }
  cv._Y=Y;
}

// hover / touch crosshair
function locate(clientX){
  const rect=cv.getBoundingClientRect();
  const x=clientX-rect.left;
  if(!view.length||!layout) return null;
  const t=layout.t0+(x-layout.x0)/(layout.x1-layout.x0)*(layout.t1-layout.t0);
  let lo=0, hi=view.length-1;
  while(hi-lo>1){ const m=(lo+hi)>>1; (view[m].t<t)?lo=m:hi=m; }
  return (Math.abs(view[lo].t-t)<Math.abs(view[hi].t-t))?lo:hi;
}
function showTip(i, clientX){
  const v=view[i], b=band(v.r), rect=cv.getBoundingClientRect();
  draw();
  const g=cv.getContext("2d");
  const x=px[i], y=cv._Y(v.p);
  g.strokeStyle="#3B4C66"; g.setLineDash([4,4]); g.lineWidth=1;
  g.beginPath(); g.moveTo(x,10); g.lineTo(x,394); g.stroke(); g.setLineDash([]);
  g.fillStyle=b.c; g.beginPath(); g.arc(x,y,4.5,0,7); g.fill();
  g.strokeStyle="#0E1520"; g.lineWidth=1.5; g.stroke();
  const dt=new Date(v.t).toLocaleDateString("en",{day:"numeric",month:"short",year:"numeric",timeZone:"UTC"});
  tip.innerHTML=`<div class="d">${dt}</div><div class="p">$${Math.round(v.p).toLocaleString()}</div>`+
    `<div>Gresham Index <b>${v.r.toFixed(2)}</b></div><div class="z" style="${b.divider?`background:none;border:1px solid ${b.c};color:${b.c}`:`background:${b.c}`}">${b.s}</div>`;
  tip.style.display="block";
  const tw=tip.offsetWidth;
  let left=x+14; if(left+tw>rect.width-8) left=x-tw-14;
  tip.style.left=left+"px"; tip.style.top="14px";
}
cv.addEventListener("mousemove", e=>{ const i=locate(e.clientX); if(i!=null) showTip(i,e.clientX); });
cv.addEventListener("mouseleave", ()=>{ tip.style.display="none"; draw(); });
cv.addEventListener("touchstart", e=>{ const i=locate(e.touches[0].clientX); if(i!=null) showTip(i); }, {passive:true});
cv.addEventListener("touchmove", e=>{ const i=locate(e.touches[0].clientX); if(i!=null) showTip(i); }, {passive:true});
cv.addEventListener("touchend", ()=>{ tip.style.display="none"; draw(); });
window.addEventListener("resize", ()=>{ if(view.length) draw(); });
})();
</script>

<script>
(function(){
  var ID = "chart";
  function h(){
    var b = document.body, e = document.documentElement;
    return Math.max(b.scrollHeight, b.offsetHeight, e.scrollHeight, e.offsetHeight);
  }
  var last = 0;
  function post(){
    var v = h();
    if (Math.abs(v - last) < 2) return;
    last = v;
    parent.postMessage({ type: "gresham-embed-height", id: ID, height: v }, "*");
  }
  window.addEventListener("load", function(){ post(); setTimeout(post, 300); setTimeout(post, 1200); });
  window.addEventListener("resize", post);
  if (window.ResizeObserver){ try { new ResizeObserver(post).observe(document.body); } catch(e){} }
  document.addEventListener("click", function(){ setTimeout(post, 60); });
  setInterval(post, 2000);
})();
</script>
</body>
</html>
